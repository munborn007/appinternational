<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found | APP International</title>
    <style>
      :root{--brand:#003366;--muted:#64748b;--ring:#e5e7eb}
      body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f7f9fc;color:#0f172a}
      .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
      .card{max-width:620px;width:100%;background:#fff;border:1px solid var(--ring);border-radius:16px;padding:28px 22px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
      h1{margin:0 0 8px;font-size:28px;color:var(--brand)}
      p{margin:0 0 16px;color:var(--muted);line-height:1.6}
      a{display:inline-block;text-decoration:none;font-weight:700;color:#fff;background:var(--brand);padding:10px 14px;border-radius:10px}
      a:hover{opacity:.92}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Page not found</h1>
        <p>The link may be incorrect or the page has moved. Please return to the homepage and continue browsing our inventory.</p>
        <a href="index.html">Back to Home</a>
      </div>
    </div>
  </body>
</html>
